  <h1>Word Guessing</h1>
  <div id="difficultySelector" style="text-align: center; margin-bottom: 20px;">
  <button data-difficulty="easy">Easy</button>
  <button data-difficulty="normal">Normal</button>
  <button data-difficulty="hard">Hard</button>
</div>

  <section id="game">
    <p>Scrambled Word:</p>
    <div id="scrambled" class="box">-</div>
    <input id="guessInput" type="text" placeholder="Guess Here" />
    <button id="guessBtn">Guess</button>
    <p id="result"></p>
    <button id="newWordBtn">New Word</button>
    <button id="hintBtn">Get Hint</button>
    <p id="hintDisplay"></p>
